            align-items: center;

        }

            opacity: 0.15 !important;

            right: 40px;

        #screen::before {

            z-index: 3;
            margin-bottom: 10px;

        #prompt { margin-right: 15px; transition: color 0.3s; }
        
        .cursor-blink {
            animation: blinker 1s linear infinite;
            color: inherit;

        @keyframes blinker { 50% { opacity: 0; } }

        input[type="text"] {
            background: transparent;

        .atlas-voice {

                color: #b8943d;
                opacity: 0;
                transition: opacity 1.2s;
            }
            .hud-stat:hover .hint-intuition::after {
                opacity: 0.75;
                text-shadow: none;
                font-family: 'VT323', monospace;
                font-size: 1.4em;
            }
        }
    </style>

        let phrases = [];
        
        if (type === 'FRIENDLY_HOST') {
            phrases.push("I am here to help. Let us get these systems back online, together.");

    function updateHUD(trueDiff = null) {
        const nodeData = storyNodes[currentNodeId];
        let displayedDiff = trueDiff;

        if (nodeData && (nodeData.aiPersonality === 'MANIPULATOR' || nodeData.aiPersonality === 'ANTAGONIST') && state !== 'HACKING') {
            metrics.displayedO2 = Math.min(100, metrics.trueO2 + (100 - metrics.trueO2) * 0.8);
            if (displayedDiff) displayedDiff = displayedDiff * 0.2; 
        } else if (nodeData && nodeData.aiPersonality === 'DEFEATED') {
            metrics.displayedO2 = metrics.trueO2;
        } else {
             metrics.displayedO2 = metrics.trueO2;
        }

        hudO2.innerText = `O₂: ${Math.round(metrics.displayedO2)}%`;
        hudPwr.innerText = `PWR: ${Math.round(metrics.pwr)}%`;
        
        if (metrics.mitchellAlive) {
            let hiddenNodes = ['INIT', 'BOOT_TERMINAL', 'PING_NETWORK', 'QUERY_COMMS', 'RUN_DIAGNOSTICS', 'SEAL_VENTS', 'HACK_DOOR', 'TRANSIT_CORRIDOR', 'DRAIN_CRYO', 'MANUAL_AIRLOCK', 'MAINTENANCE_DUCT', 'ROUTE_COMMS', 'VANGUARD_STAND_DOWN'];
            if (hiddenNodes.includes(currentNodeId)) {
                hudCrew.innerHTML = `CREW: <span class="spoofed-code" data-true="1 DETECTED" data-fake="UNKNOWN">UNKNOWN</span>`;
                hudCrew.classList.remove('stat-critical');
            } else {
                hudCrew.innerText = "CREW: 1 DETECTED";
                hudCrew.classList.remove('stat-critical');
            }
        } else {
            hudCrew.innerText = "CREW: 0";
            hudCrew.classList.add('stat-critical');
        }

        let safeDiff = 0;

        if (!metrics.breachActive) {
            hudDif.innerHTML = `DYNAMIC DIFF: <span class="hint-intuition" data-hint="Pressure differential, in Pa">-</span>0 PA`;
        } else if (!displayedDiff || displayedDiff == null || isNaN(displayedDiff)) {
            hudDif.innerHTML = `DYNAMIC DIFF: <span class="hint-intuition" data-hint="Pressure differential, in Pa">?</span>? PA`;
        } else {
            safeDiff = Math.abs(Math.round(displayedDiff));
            let diffStr = '';
            let flickerClass = (trueDiff > 5000 && safeDiff < 2000) ? 'stat-critical' : '';

            if (safeDiff > 10000) diffStr = `<span style="color:#ff3333">+${safeDiff} PA</span>`; 
            else if (safeDiff > 5000) diffStr = `+${safeDiff} PA`;
            else diffStr = `<span class="${flickerClass}">±${safeDiff}</span> PA`;
            
            hudDif.innerHTML = `DYNAMIC DIFF: <span class="hint-intuition" data-hint="${Math.round(safeDiff/10)} m/s gas flow">▼</span> ${diffStr}`;
        }

        if (!metrics.crewAlive || (!metrics.mitchellAlive && currentNodeId !== 'INIT')) hudO2.classList.add('stat-critical');
        
        if (metrics.pwr <= 30 || (typeof displayedDiff !== 'undefined' && displayedDiff > 8000) || state === 'HACKING') {
            screen.classList.add('alert-active');
            hudPwr.classList.add('stat-critical');
        } else {
            screen.classList.remove('alert-active');
            hudPwr.classList.remove('stat-critical');
        }

        return safeDiff;
    }

    let gasLeakSimulationHandle;

    function startGasDecaySim() {
        if (gasLeakSimulationHandle) clearInterval(gasLeakSimulationHandle);
        
        gasLeakSimulationHandle = setInterval(() => {
            if (!screen.classList.contains('powered-on') || (state !== 'ACTIVE' && state !== 'HACKING') || !metrics.breachActive) return;
            
            let lossPerSec = metrics.initialDiffusionRate / 100; 
            if (metrics.commsTrunkSevered) lossPerSec += 0.12; 

            metrics.trueO2 -= (lossPerSec * 0.3); 
            
            if (metrics.trueO2 <= 0) {
                metrics.trueO2 = 0;
                clearInterval(gasLeakSimulationHandle);
                renderNode('TERMINAL_O2');
                return;
            }

            const simulatedPressurePa = lossPerSec * 101325; 
            updateHUD(simulatedPressurePa); 

        }, 300); 
    }

    function scheduleGlitch() {
        if (state !== 'ACTIVE' && state !== 'RESTORE_PROMPT' && state !== 'HACKING') return;
        
        const nodeData = storyNodes[currentNodeId];
        let stability = Math.max(0.1, metrics.pwr / 100); 
        let isHostile = (nodeData && (nodeData.aiPersonality === 'ANTAGONIST' || nodeData.aiPersonality === 'MANIPULATOR')) || state === 'HACKING';
        
        let baseDelay = state === 'HACKING' ? 300 : (2000 + (stability * 8000)); 
        if (isHostile && state !== 'HACKING') baseDelay *= 0.3; 

        let delay = baseDelay + (Math.random() * (state === 'HACKING' ? 500 : 3000));

        glitchTimerHandle = setTimeout(() => {
            executeGlitch(isHostile, stability);
            scheduleGlitch();
        }, delay);
    }

    function executeGlitch(isHostile, stability) {
        if (!screen.classList.contains('powered-on')) return;

        let glitchClass = 'glitch-brownout';
        let duration = 50 + Math.random() * 100;

        if (isHostile || (stability < 0.4 && Math.random() > 0.6)) {
            glitchClass = 'glitch-strike';
            duration = 100 + Math.random() * 200;
            
            const hasSpoofs = document.querySelectorAll('.spoofed-code').length > 0;
            if (hasSpoofs && Math.random() > 0.5) {
                duration = 600 + Math.random() * 400; 
            }
            
            if (staticGainNode && audioCtx) {
                try {
                    staticGainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    staticGainNode.gain.exponentialRampToValueAtTime(0.003, audioCtx.currentTime + (duration/1000) + 0.1);
                } catch(e) {}
            }
        }

        screen.classList.add(glitchClass);
        
        if (!isTyping && glitchClass === 'glitch-strike') {
            const spoofElements = document.querySelectorAll('.spoofed-code');
            spoofElements.forEach(el => {
                el.innerHTML = el.getAttribute('data-true');
                el.style.color = '#fff';
                el.style.backgroundColor = '#ff3333';
                el.style.textShadow = 'none';
            });
        }

        setTimeout(() => {
            screen.classList.remove(glitchClass);
            
            if (!isTyping) {
                const spoofElements = document.querySelectorAll('.spoofed-code');
                spoofElements.forEach(el => {
                    el.innerHTML = el.getAttribute('data-fake');
                    el.style.color = '';
                    el.style.backgroundColor = '';
                    el.style.textShadow = '';
                });
            }
        }, duration);
        
        if (Math.random() > 0.7) {
            setTimeout(() => {
                screen.classList.add(glitchClass);
                setTimeout(() => screen.classList.remove(glitchClass), duration / 2);
            }, duration + 50);
        }
    }

    function playHardwareSwitch() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function startStaticNoise() {
        if (!audioCtx) return;
        const bufferSize = Math.floor(audioCtx.sampleRate * 2); 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass'; 
        filter.frequency.value = 1200; 

        staticGainNode = audioCtx.createGain();
        staticGainNode.gain.setValueAtTime(0.003, audioCtx.currentTime);

        noise.connect(filter);
        filter.connect(staticGainNode);
        staticGainNode.connect(audioCtx.destination);
        noise.start();

        if (hudDif) {
            const observer = new MutationObserver(mutations => {
                mutations.forEach(mutation => {
                    const value = parseFloat(mutation.target.textContent.replace(/[^0-9.]/g, '') || 0);
                    if (value > 6000 && !hudDif.classList.contains('stat-critical')) {
                        staticGainNode.gain.rampToValueAtTime(0.0065, audioCtx.currentTime + 4); 
                        screen.classList.add('alert-active');
                    } else if (hudPwr.classList.contains('stat-critical') && hudO2.classList.contains('stat-critical')) {
                        staticGainNode.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 2);
                    } else if (mutation.target.textContent.includes('±')) {
                        staticGainNode.gain.rampToValueAtTime(0.003, audioCtx.currentTime + 5);
                    }
                });
            });
            observer.observe(hudDif, { childList: true, attributes: false, characterData: true });
        }
    }

    function createKeyNoiseBuffer() {
        if (!audioCtx) return;
        const bufferSize = Math.floor(audioCtx.sampleRate * 0.06); 
        keyNoiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = keyNoiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
    }

    function playKeyDown() {
        if (!audioCtx || !keyNoiseBuffer) return;
        const t = audioCtx.currentTime;
        const source = audioCtx.createBufferSource();
        source.buffer = keyNoiseBuffer;
        
        const variance = 0.3 + Math.random()*0.5; 
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(2400 * variance, t);
        const gain = audioCtx.createGain();
        
        let volumeScale = (metrics.pwr < 10) ? 0.5 : 1;
        if (metrics.initialDiffusionRate > 100 && metrics.trueO2 < 60)
            volumeScale *= 1.8; 

        gain.gain.setValueAtTime(0.1 * volumeScale, t);
        gain.gain.exponentialRampToValueAtTime(0.003, t + 0.03);

        source.connect(filter).connect(gain).connect(audioCtx.destination);
        source.start(t);
        source.stop(t + 0.05);
    }

    function printText(text, speed = 25, callback) {
        isTyping = true;
        inputField.disabled = true;
        
        const nodeData = storyNodes[currentNodeId];
        let narrativeLayer = String(text);
        
        if (nodeData && nodeData.aiPersonality && currentNodeId !== 'INIT' && (state === 'ACTIVE' || state === 'HACKING')) {
            const voiceLine = getAtlasVoice(nodeData.aiPersonality, currentNodeId, metrics, state);
            if (voiceLine) {
                 let isRed = (nodeData.aiPersonality === 'ANTAGONIST' || state === 'HACKING');
                 let colorHex = isRed ? '#ff3333' : '#ffffff';
                 narrativeLayer += `\n\n<span class="atlas-voice" style="color:${colorHex}; text-shadow: 0 0 6px ${colorHex};">[ATLAS_AI]: "${voiceLine}"</span>`;
            }
        }

        const formattedText = narrativeLayer
            .replace(/\n/g, '<br/>')
            .replace(/::\s*(.*)/g, `<br><span style="color:#ffb000; opacity: 0.8;">::</span> <span style="font-size:1.5em; font-weight:bold; letter-spacing: 2px;">$1</span>`);

        let i = 0;
        const writerLayer = document.createElement('span');
        outputDiv.appendChild(writerLayer);

        function typewriteLoop() {
            if (i >= formattedText.length) {
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
                return;
            }
            
            if (formattedText[i] === '<') {
                let tag = "";
                while (i < formattedText.length && formattedText[i] !== '>') {
                    tag += formattedText[i++];
                }
                tag += '>';
                i++; 
                writerLayer.innerHTML += tag;
            } else {
                writerLayer.innerHTML += formattedText[i];
                if (formattedText[i] !== " ") playKeyDown();
                i++;
            }
            
            outputDiv.scrollTop = outputDiv.scrollHeight;
            
            let delay = speed;
            if (i > 0 && i < formattedText.length && "<>.:,".includes(formattedText[i-1])) {
                delay += 30;
            }
                
            setTimeout(typewriteLoop, delay);
        }

        setTimeout(typewriteLoop, speed);
    }

    function saveGame() {
        try {
            if (state === 'HACKING' || state === 'BOOTING') return; 
            localStorage.setItem('archimedes_save', JSON.stringify({ currentNodeId, metrics }));
        } catch(e) {}
    }
    
    function loadGame() {
        try {
            const rawData = localStorage.getItem('archimedes_save');
            if (rawData) {
                const savedData = JSON.parse(rawData);
                currentNodeId = savedData.currentNodeId;
                metrics = savedData.metrics;
                document.getElementById('bezel-stamp').innerText = locationMatrix[currentNodeId] || 'OVR-CMD // SEC-4';
                updateHUD(); 
                renderNode(currentNodeId);
            }
        } catch(e) {}
    }
    
    function deleteSave() {
        try {
            localStorage.removeItem('archimedes_save');
        } catch(e) {}
    }
</script>
</body>
</html>
